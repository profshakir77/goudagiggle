kind = "web"
previewPath = "/"
title = "Gouda Giggles"
version = "1.0.0"
id = "artifacts/gouda-giggles"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19782

[services.development]
run = "pnpm --filter @workspace/gouda-giggles run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gouda-giggles", "run", "build" ]
publicDir = "artifacts/gouda-giggles/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19782"
BASE_PATH = "/"
